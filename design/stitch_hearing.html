</div>

<div class="glass-card rounded-3xl p-5 space-y-4">
<div class="grid grid-cols-[1fr_auto_auto] gap-4 mb-2 text-[10px] text-on-surface-variant uppercase font-black px-2">

<span class="w-20 text-center">L</span>
<span class="w-20 text-center">R</span>
</div>
<!-- Frequency Rows -->
<div class="space-y-4">
<!-- Row Generator (250Hz to 8kHz) -->
<div class="flex items-center justify-between gap-4">
<span class="text-xs font-medium text-on-surface/80">250 Hz</span>
<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-15"/>
<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-20"/>
</div>
<div class="flex items-center justify-between gap-4">
<span class="text-xs font-medium text-on-surface/80">500 Hz</span>
<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-10"/>
<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-12"/>
</div>
<div class="flex items-center justify-between gap-4">
<span class="text-xs font-medium text-on-surface/80">1 kHz</span>
<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-25"/>

<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-35"/>

<div class="flex items-center justify-between gap-4">

<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-30"/>
<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-45"/>
</div>
<div class="flex items-center justify-between gap-4">
<span class="text-xs font-medium text-on-surface/80">8 kHz</span>
<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-20"/>
<input class="w-20 accent-primary" max="0" min="-90" type="range" value="-20"/>
</div>
</div>
</div>
</section>

<div class="flex-grow">
<input class="w-full" max="100" min="0" type="range" value="65"/>
</div>
<div class="text-4xl font-black tracking-tighter text-primary tabular-nums">
                    65%
                </div>
</div>
</section>

<span>0</span>
<span>R+</span>
</div>
</div>
